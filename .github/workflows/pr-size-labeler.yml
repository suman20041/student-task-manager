name: Pull Request Size Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - name: Calculate changes and assign labels
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const additions = pullRequest.additions;
            const deletions = pullRequest.deletions;
            const totalChanges = additions + deletions;

            console.log(`Additions: ${additions}, Deletions: ${deletions}, Total Changes: ${totalChanges}`);

            let sizeLabel = 'size/XS';
            if (totalChanges > 500) {
              sizeLabel = 'size/XL';
            } else if (totalChanges > 200) {
              sizeLabel = 'size/L';
            } else if (totalChanges > 100) {
              sizeLabel = 'size/M';
            } else if (totalChanges > 20) {
              sizeLabel = 'size/S';
            }

            console.log(`Assigning label: ${sizeLabel}`);

            // Get existing labels on PR
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const sizeLabels = ['size/XS', 'size/S', 'size/M', 'size/L', 'size/XL'];
            
            // Remove other size labels if they exist
            for (const label of currentLabels) {
              if (sizeLabels.includes(label.name) && label.name !== sizeLabel) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    name: label.name,
                  });
                  console.log(`Removed label: ${label.name}`);
                } catch (e) {
                  console.log(`Failed to remove label: ${label.name}`);
                }
              }
            }

            // Add new size label if it's not already present
            if (!currentLabels.some(l => l.name === sizeLabel)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [sizeLabel],
              });
              console.log(`Added label: ${sizeLabel}`);
            }
