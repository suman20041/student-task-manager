<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Task Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="site-header">
    <h1>📚 Study Task Tracker</h1>
    
  <select id="themeSwitcher" class="theme-dropdown">
  <option value="light">🌞 Light</option>
  <option value="dark">🌙 Dark</option>
  <option value="blue">🩵 Blue</option>
  <option value="pastel">🎀 Pastel</option>
</select>
    
  </header>

  <main id="main-content" class="container">
    <form id="taskForm" onsubmit="event.preventDefault(); addTask();">
      <label for="taskInput">Task description</label>
      <input type="text" id="taskInput" placeholder="Enter task" aria-describedby="taskHelp">
      
      <div class="form-row">
        <select id="priorityInput" aria-label="Task Priority">
          <option value="low">Low Priority</option>
          <option value="medium">Medium Priority</option>
          <option value="high">High Priority</option>
        </select>
        <input type="date" id="dueDateInput" aria-label="Due Date">
      </div>

      <button type="submit">Add</button>
    <button type="button" id="clearAllBtn">Clear All</button>
      <p id="taskHelp" class="sr-only">Enter a task and press Add to track your study items.</p>
    </form>
    
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search tasks..." aria-label="Search tasks">
    </div>

    <p id="errorMsg" class="error" role="alert"></p>

    <ul id="taskList" aria-live="polite" aria-label="Task list"></ul>
    
    <div class="progress-container">
      <div id="progressBar" class="progress-bar"></div>
    </div>
    <p id="taskStats"></p>

    <div id="celebration" class="celebration hidden">
    <img src="task completed image.jpg" alt="Celebration" />
    <p>All tasks completed! 🎉</p>
  </div>

  </main>

  <footer class="site-footer">
    <nav aria-label="Footer navigation">
      <a href="docs.html">📖 Docs</a>
      <a href="faq.html">❓ FAQ</a>
      <a href="privacy.html">🛡️ Privacy</a>
      <a href="terms.html">📜 Terms</a>
      <a href="#main-content">🔝 Back to top</a>
    </nav>
    <p>Accessible study tracking with keyboard support and semantic structure.</p>
    <p>&copy; 2026 Study Task Tracker</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
