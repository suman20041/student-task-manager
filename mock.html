<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Analyzer • TaskQuest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg: #060814;
            --card: rgba(15, 12, 38, 0.45);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #a855f7;
            --secondary: #06b6d4;
            --text: #ffffff;
            --text-light: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
            --radius: 24px;
        }

        [data-theme="sunset"] {
            --bg: #fffcf8;
            --card: rgba(255, 255, 255, 0.75);
            --border: rgba(0, 0, 0, 0.07);
            --text: #1e293b;
            --text-light: #64748b;
            --primary: #f59e0b;
            --secondary: #f43f5e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            background-image: radial-gradient(circle at 50% 50%, rgba(168, 85, 247, 0.05) 0%, var(--bg) 100%);
        }

        .container { width: 100%; max-width: 900px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        header h1 { font-family: 'Poppins', sans-serif; font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .glass-card { background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px; margin-bottom: 30px; }

        .api-key-config { background: rgba(168, 85, 247, 0.05); border: 1px solid var(--border); padding: 20px; border-radius: 20px; margin-bottom: 25px; display: flex; flex-direction: column; gap: 10px; }
        .api-key-config label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-light); }
        .api-key-config .input-row { display: flex; gap: 10px; }
        .api-key-config input { flex: 1; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border); padding: 12px 16px; border-radius: 12px; color: var(--text); font-size: 14px; outline: none; transition: 0.3s; }
        .api-key-config input:focus { border-color: var(--primary); }

        .upload-section { border: 2px dashed var(--border); border-radius: 20px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-section:hover { border-color: var(--primary); background: rgba(168, 85, 247, 0.05); }
        .upload-section i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; display: block; }
        
        .preview-container { margin-top: 20px; display: none; text-align: center; }
        .preview-img { max-width: 100%; border-radius: 12px; border: 1px solid var(--border); max-height: 400px; object-fit: contain; }

        .btn { border: none; border-radius: 12px; cursor: pointer; font-weight: 700; padding: 12px 24px; transition: all 0.3s; display: flex; align-items: center; gap: 8px; font-family: 'Poppins', sans-serif; text-decoration: none; justify-content: center; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .analysis-loader { display: none; margin: 30px 0; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .results-section { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .result-group { margin-bottom: 25px; }
        .result-group h3 { font-family: 'Poppins', sans-serif; font-size: 1.2rem; color: var(--secondary); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        .topic-pill { display: inline-block; padding: 6px 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; margin: 0 8px 8px 0; color: var(--text-light); }

        .quiz-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .quiz-question { font-weight: 600; margin-bottom: 12px; display: block; }
        .quiz-options { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .quiz-option { padding: 10px 15px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .quiz-option:hover { border-color: var(--primary); background: rgba(168, 85, 247, 0.05); }

        .prompt-item { padding: 12px; border-left: 3px solid var(--primary); background: rgba(168, 85, 247, 0.05); margin-bottom: 10px; font-size: 14px; border-radius: 0 10px 10px 0; }
    </style>
</head>
<body data-theme="cosmic">
    <div class="container">
        <header>
            <a href="index.html" class="btn" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text);"><i class="ri-home-4-line"></i> Dashboard</a>
            <h1>AI Study Analyzer</h1>
        </header>

        <div class="glass-card">
            <div class="api-key-config" id="apiKeySection">
                <label for="geminiKey">Gemini API Key (Required for actual analysis)</label>
                <div class="input-row">
                    <input type="password" id="geminiKey" placeholder="Paste your Google AI API key here..." />
                    <a href="https://aistudio.google.com/app/apikey" target="_blank" class="btn" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); font-size: 12px; color: var(--text-light); white-space: nowrap;">Get Key <i class="ri-external-link-line"></i></a>
                </div>
                <p style="font-size: 11px; color: var(--text-light);">Your key is saved locally in your browser and never shared.</p>
            </div>

            <div class="upload-section" id="dropZone">
                <i class="ri-image-add-line"></i>
                <h2>Upload Study Material</h2>
                <p style="color: var(--text-light); margin-top: 10px;">Upload a photo of your notes or a textbook page</p>
                <input type="file" id="fileInput" hidden accept="image/*">
            </div>

            <div class="preview-container" id="previewContainer">
                <img id="imagePreview" class="preview-img" alt="Preview">
                <div style="margin-top: 20px; display: flex; gap: 15px; justify-content: center;">
                    <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalysis()">
                        <i class="ri-magic-line"></i> Analyze with AI
                    </button>
                    <button class="btn" style="background: var(--danger); color: white;" onclick="resetUpload()">
                        <i class="ri-delete-bin-line"></i> Remove
                    </button>
                </div>
            </div>

            <div class="analysis-loader" id="loader">
                <div class="spinner"></div>
                <p id="loaderText">AI is scanning your image...</p>
            </div>

            <div class="results-section" id="results">
                <div class="result-group">
                    <h3><i class="ri-focus-3-line"></i> Extracted Topics</h3>
                    <div id="topicsList"></div>
                </div>

                <div class="result-group">
                    <h3><i class="ri-questionnaire-line"></i> AI-Generated Quiz</h3>
                    <div id="quizContainer"></div>
                </div>

                <div class="result-group">
                    <h3><i class="ri-lightbulb-flash-line"></i> Active Recall Prompts</h3>
                    <div id="promptsList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        function handleFile(file) {
            if (!file) return;
            window.currentFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('dropZone').style.display = 'none';
                document.getElementById('previewContainer').style.display = 'block';
                document.getElementById('results').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        function resetUpload() {
            fileInput.value = '';
            window.currentFile = null;
            document.getElementById('dropZone').style.display = 'block';
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('results').style.display = 'none';
        }

        async function startAnalysis() {
            const inputApiKey = document.getElementById('geminiKey').value.trim();
            const apiKeyToUse = inputApiKey || window.storedGeminiApiKey; // Use input if provided, else use stored

            if (!apiKeyToUse) return alert("Please enter your Gemini API Key.");
            
            localStorage.setItem('taskquest_v1.gemini_api_key', apiKeyToUse); // Save the key that is actually used
            window.storedGeminiApiKey = apiKeyToUse; // Update in-memory variable
            const loader = document.getElementById('loader');
            const results = document.getElementById('results');
            const analyzeBtn = document.getElementById('analyzeBtn');
            
            loader.style.display = 'block';
            results.style.display = 'none';
            analyzeBtn.disabled = true;

            try {
                const base64Data = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onloadend = () => r(reader.result.split(',')[1]);
                    reader.readAsDataURL(window.currentFile);
                });

                const prompt = "Analyze this study material. Extract core topics, make a 2-question MCQ quiz, and 3 recall prompts. Return ONLY JSON like: {\"topics\": [], \"quiz\": [{\"q\": \"\", \"options\": []}], \"prompts\": []}. No markdown.";
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: window.currentFile.type, data: base64Data } }] }] })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || "API request failed");
                
                let text = data.candidates[0].content.parts[0].text;
                const cleanJson = text.replace(/```json|```/g, "").trim();
                const parsed = JSON.parse(cleanJson);

                document.getElementById('topicsList').innerHTML = parsed.topics.map(t => `<span class="topic-pill">${t}</span>`).join('');
                document.getElementById('quizContainer').innerHTML = parsed.quiz.map((q, i) => `<div class="quiz-card"><span class="quiz-question">${i+1}. ${q.q}</span><div class="quiz-options">${q.options.map(o => `<div class="quiz-option" onclick="this.style.borderColor='var(--success)'">${o}</div>`).join('')}</div></div>`).join('');
                document.getElementById('promptsList').innerHTML = parsed.prompts.map(p => `<div class="prompt-item">${p}</div>`).join('');
                
                loader.style.display = 'none';
                results.style.display = 'block';
            } catch (err) {
                alert("Analysis Error: " + err.message);
                loader.style.display = 'none';
            } finally { analyzeBtn.disabled = false; }
        }

        document.body.setAttribute('data-theme', localStorage.getItem('taskquest_v1.theme') || 'cosmic');
        // Do NOT set the value of the input field. It should appear empty.
        window.storedGeminiApiKey = localStorage.getItem('taskquest_v1.gemini_api_key') || ''; // Store key in memory
    </script>
</body>
</html>
