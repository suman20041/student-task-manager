<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronicles of Mastery • TaskQuest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #04060b;
            --surface: rgba(15, 18, 30, 0.6);
            --border: rgba(245, 200, 66, 0.15);
            --gold: #f5c842;
            --gold-dim: #c99e28;
            --gold-glow: rgba(245, 200, 66, 0.3);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --primary: #8b5cf6;
            --radius-lg: 24px;
            --premium-grad: linear-gradient(135deg, #f5c842 0%, #c99e28 50%, #8a6a1a 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(245, 200, 66, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
        }

        .sparkles {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
        .btn-back { 
            text-decoration: none; color: var(--text-dim); display: flex; align-items: center; gap: 8px; 
            font-size: 14px; font-weight: 600; transition: 0.3s; padding: 10px 20px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--surface);
        }
        .btn-back:hover { color: var(--gold); border-color: var(--gold); transform: translateX(-5px); }

        .page-title {
            font-family: 'Cinzel', serif;
            font-size: 36px;
            color: var(--gold);
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            text-align: center;
            backdrop-filter: blur(20px);
        }
        .stat-card i { font-size: 32px; color: var(--gold); display: block; margin-bottom: 12px; }
        .stat-val { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 800; color: #fff; line-height: 1; }
        .stat-label { font-size: 12px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1.5px; margin-top: 8px; }

        .history-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .history-grid { grid-template-columns: 1fr; } }

        .history-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 30px;
            backdrop-filter: blur(20px);
        }
        .section-header { 
            display: flex; align-items: center; gap: 12px; margin-bottom: 25px; 
            font-family: 'Poppins', sans-serif; font-size: 18px; color: var(--gold);
        }

        .archive-list { display: flex; flex-direction: column; gap: 15px; }
        .archive-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 20px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: 0.3s;
        }
        .archive-item:hover { background: rgba(245, 200, 66, 0.05); transform: scale(1.01); }
        .item-tag { 
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            padding: 4px 10px; border-radius: 8px; background: var(--gold-glow); color: var(--gold);
        }
        .item-text { font-size: 14px; font-weight: 500; color: #fff; }
        .item-date { font-size: 11px; color: var(--text-dim); }
        .item-pts { font-family: 'Poppins', sans-serif; font-weight: 800; color: var(--gold); font-size: 16px; }

        .chart-container { height: 250px; width: 100%; margin-top: 10px; }

        .reward-shelf { display: flex; flex-direction: column; gap: 12px; }
        .reward-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 12px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
        }
        .reward-icon { font-size: 20px; }
        .reward-info h4 { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
        .reward-info p { font-size: 10px; color: var(--text-dim); }

        .empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
        .empty-state i { font-size: 48px; margin-bottom: 10px; opacity: 0.3; }
    </style>
</head>
<body>
    <div class="sparkles"></div>
    <div class="container">
        <header>
            <a href="Challenge.html" class="btn-back"><i class="ri-arrow-left-line"></i> Back to Challenges</a>
            <div class="logo-text" style="text-align: right;">
                <span style="font-family: 'Cinzel', serif; color: var(--gold); font-size: 20px; letter-spacing: 2px;">TaskQuest</span>
                <p style="font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 3px;">Victory Archive</p>
            </div>
        </header>

        <h1 class="page-title">Chronicles of Mastery</h1>

        <div class="stats-summary">
            <div class="stat-card">
                <i class="ri-medal-fill"></i>
                <div class="stat-val" id="totalPts">0</div>
                <div class="stat-label">Points Earned</div>
            </div>
            <div class="stat-card">
                <i class="ri-checkbox-circle-fill"></i>
                <div class="stat-val" id="totalCompleted">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <i class="ri-fire-fill"></i>
                <div class="stat-val" id="totalBadges">0</div>
                <div class="stat-label">Badges Won</div>
            </div>
        </div>

        <div class="history-grid">
            <div class="left-col">
                <div class="history-panel">
                    <div class="section-header">
                        <i class="ri-history-line"></i>
                        <h2>Challenge Archive</h2>
                    </div>
                    <div class="archive-list" id="archiveList"></div>
                </div>
            </div>
            <div class="right-col">
                <div class="history-panel" style="margin-bottom: 30px;">
                    <div class="section-header">
                        <i class="ri-pie-chart-line"></i>
                        <h2>Performance</h2>
                    </div>
                    <div class="chart-container">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>
                <div class="history-panel">
                    <div class="section-header">
                        <i class="ri-award-line"></i>
                        <h2>Honorary Rewards</h2>
                    </div>
                    <div class="reward-shelf" id="rewardShelf"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const state = JSON.parse(localStorage.getItem('taskquest_v1.challenge') || '{}');
            const history = state.completedChallenges || [];
            const earnedBadges = state.earnedBadges || [];
            document.getElementById('totalPts').textContent = state.totalPts || 0;
            document.getElementById('totalCompleted').textContent = history.length;
            document.getElementById('totalBadges').textContent = earnedBadges.length;

            const archiveList = document.getElementById('archiveList');
            if (!history.length) {
                archiveList.innerHTML = '<div class="empty-state"><i class="ri-ghost-line"></i><p>Archive is silent.</p></div>';
            } else {
                archiveList.innerHTML = history.reverse().map(i => {
                    const d = new Date(i.completedAt);
                    return `<div class="archive-item"><div class="item-tag">${i.tag}</div><div class="item-info"><div class="item-text">${i.text}</div><div class="item-date">${d.toLocaleDateString()}</div></div><div class="item-pts">+${i.pts}</div></div>`;
                }).join('');
            }

            document.getElementById('rewardShelf').innerHTML = earnedBadges.map(b => `<div class="reward-item"><div class="reward-icon">🏆</div><div class="reward-info"><h4>${b}</h4><p>Achievement Milestone</p></div></div>`).join('') || '<p style="color:var(--text-dim); text-align:center; font-size:12px;">No badges yet.</p>';

            const catMap = {}; history.forEach(i => { const t = i.tag.split(' ')[1]; catMap[t] = (catMap[t] || 0) + 1; });
            new Chart(document.getElementById('categoryChart'), { type: 'doughnut', data: { labels: Object.keys(catMap), datasets: [{ data: Object.values(catMap), backgroundColor: ['#f5c842', '#8b5cf6', '#06b6d4', '#ec4899'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } }, cutout: '70%' } });
        });
    </script>
</body>
</html>
